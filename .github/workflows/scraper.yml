name: Ejecutar Scraper

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto
  workflow_dispatch:        # permite ejecutarlo manualmente también

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        run: python jkanime.py

      - name: Subir episodios.json al repositorio
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add episodios.json
          git diff --staged --quiet || git commit -m "Actualizar episodios.json"
          git push
